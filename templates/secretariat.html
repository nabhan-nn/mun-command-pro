<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretariat — MUN Command Pro</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="app-page">

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-brand">⬡ MUN Command Pro</div>
      <div class="room-pill" style="background:#FCEBEB">
        <span style="color:#791F1F;font-size:13px">Secretariat</span>
        <span class="room-pill-label" style="color:#c0392b">Admin</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn active" data-tab="overview">Overview</button>
      <button class="nav-btn" data-tab="chit-monitor">Chit Monitor</button>
      <button class="nav-btn" data-tab="rooms">Rooms</button>
    </nav>

    <div class="sidebar-bottom">
      <div class="sidebar-info">
        <span id="sec-name-display">—</span>
        <span id="sec-role-display" class="sidebar-committee">—</span>
      </div>
      <button class="conference-over-btn" onclick="confirmConferenceOver()">
        Conference Over
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-area">

    <header class="main-header">
      <h1 class="main-title" id="sec-main-title">Overview</h1>
      <div class="header-status">
        <span class="status-dot"></span>
        <span>Live</span>
      </div>
    </header>

    <!-- OVERVIEW TAB -->
    <section class="tab-panel active" id="tab-overview">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="stat-rooms">0</div>
          <div class="stat-lbl">Active rooms</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-delegates">0</div>
          <div class="stat-lbl">Delegates</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-chits">0</div>
          <div class="stat-lbl">Total chits</div>
        </div>
        <div class="stat-box" style="border-color:#FCEBEB">
          <div class="stat-num" style="color:#c0392b" id="stat-marked">0</div>
          <div class="stat-lbl">Marked chits</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h2>All committees</h2></div>
        <div class="list-body" id="committees-overview">
          <div class="empty-msg">No active rooms</div>
        </div>
      </div>
    </section>

    <!-- CHIT MONITOR TAB -->
    <section class="tab-panel" id="tab-chit-monitor">
      <div class="card">
        <div class="card-header">
          <h2>All chits — every committee</h2>
        </div>
        <div class="list-body" id="all-chits-monitor">
          <div class="empty-msg">No chits yet</div>
        </div>
      </div>
    </section>

    <!-- ROOMS TAB -->
    <section class="tab-panel" id="tab-rooms">
      <div class="card">
        <div class="card-header"><h2>Room controls</h2></div>
        <div class="list-body" id="rooms-control">
          <div class="empty-msg">No active rooms</div>
        </div>
      </div>
    </section>

  </main>
</div>

<script src="/static/app.js" type="module"></script>
<script src="/static/secretariat.js" type="module"></script>
</body>
</html>
