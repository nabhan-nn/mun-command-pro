<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUN Command Pro</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="landing">
  <div class="landing-container">
    <div class="landing-logo">⬡ MUN Command Pro</div>
    <p class="landing-sub">Enter your access code to continue</p>

    <div class="login-card">
      <input type="text" id="access-code" placeholder="Enter your code (e.g. CHAIR-A1B2)" autocomplete="off" />
      <button id="login-btn">Continue</button>
      <div class="error-msg" id="login-error"></div>
      <div class="login-hint">Codes are provided by your conference secretariat</div>
    </div>
  </div>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
